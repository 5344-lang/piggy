        .pixel-btn:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @keyframes pixel-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        const playSound = (type) => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);

            const createOsc = (freq, startTime, duration, oscType = 'square') => {
                const osc = audioCtx.createOscillator();
                osc.type = oscType;
                osc.frequency.setValueAtTime(freq, startTime);
                osc.connect(gain);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };

            switch(type) {
                case 'click':
                    gain.gain.setValueAtTime(0.05, now);
                    createOsc(800, now, 0.05);
                    break;
                case 'success':
                    gain.gain.setValueAtTime(0.05, now);
                   [440, 554, 659, 880].forEach((f, i) => createOsc(f, now + (i * 0.1), 0.1, 'triangle'));
                    break;
                case 'fail':
                    gain.gain.setValueAtTime(0.1, now);
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                    osc.connect(gain);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
                case 'start':
                    gain.gain.setValueAtTime(0.05, now);
                    createOsc(400, now, 0.1);
                    createOsc(800, now + 0.1, 0.2);
                    break;
            }
        };

                host: state.user.uid, 
                status: 'LOBBY', 
                players: { [state.user.uid]: { name: state.playerName, isHost: true } }

            if (!state.playerName || !code) return updateState({ error: '이름과 코드를 입력하세요!' });
            playSound('click');
            const targetCode = code.toUpperCase();
            onValue(ref(db, `artifacts/${appId}/rooms/${targetCode}`), (snap) => {
                if (snap.exists()) {

        const startSync = (code) => { 
            onValue(ref(db, `artifacts/${appId}/rooms/${code}`), (snapshot) => {

                if (!data) return;
                if (data.status === 'REVEAL' && state.roomData?.status !== 'REVEAL') {

                    });
                    playSound(allCorrect ? 'success' : 'fail');

const submitClue = async (word, colorId, category) => {
    if (!word || !colorId || !category) return alert('모두 선택해주세요!');
    
    // 어떤 금지어에 걸렸는지 모두 찾아냅니다.
    const found = FORBIDDEN.filter(f => word.replace(/\s+/g, '').includes(f));
    
    if (found.length > 0) {
        playSound('fail');
        // 경고 모달 데이터 세팅
        updateState({
            clueWarning: { 
                show: true, 
                word: word, 
                found: found, 
                colorId: colorId, 
                category: category 
            }
        });
        return;
    }
    
    // 금지어가 없을 때 정상 출제
    await executeSubmit(word, colorId, category);
};

// 실제 DB에 전송하는 공통 로직
const executeSubmit = async (word, colorId, category) => {
    playSound('click');
    await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}/rounds/${state.roomData.currentRound}`), { 
        clue: word, answer: colorId, selectedCategory: category, clueGiver: state.user.uid 
    });
    // 모달 닫기
    updateState({ clueWarning: { show: false } });
};

            const subCount = Object.keys(room.rounds[room.currentRound].submissions || {}).length;
            if (subCount === Object.keys(room.players).length - 1) {
                if (room.currentRound < 6) {
                    setTimeout(() => {
                        playSound('success');
                        update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { currentRound: room.currentRound + 1 });
                    }, 1500);
                } else {
                    update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { status: 'REVEAL' });
                }
            }
        };

        const render = () => {
            const container = document.getElementById('app');
            if (!state.user) return;
            if (!state.roomCode) {
                container.innerHTML = `
                    <div class="flex flex-col items-center gap-8 w-full max-w-xs">
                        <div class="text-8xl mb-6 animate-pixel-bounce inline-block">🐷</div>
                        <h1 class="pixel-font text-2xl text-yellow-400">PIGGY YELLOW</h1>
                        <input id="playerName" value="${state.playerName}" placeholder="이름 입력" class="pixel-input text-center" oninput="window.state.playerName = this.value">
                        <button onclick="window.createRoom()" class="pixel-btn bg-yellow-400 w-full text-black">방 만들기</button>
                        <div class="flex gap-2 w-full">
                            <input id="joinCode" placeholder="코드" class="pixel-input uppercase text-center flex-1">
                            <button onclick="window.joinRoom(document.getElementById('joinCode').value)" class="pixel-btn bg-blue-500 text-white px-6">참가</button>
                        </div>
                    </div>
                `;
                return;
            }

            const room = state.roomData; if (!room) return;

            if (room.status === 'LOBBY') {
                const players = Object.values(room.players);
                container.innerHTML = `
                    <div class="w-full max-w-md pixel-border bg-white text-black p-6">
                        <div class="flex justify-between items-center mb-6"><h2 class="pixel-font text-xs">로비</h2><div class="bg-yellow-400 p-2 border-2 border-black font-bold">${state.roomCode}</div></div>
                        <div class="space-y-4 mb-8">${players.map(p => `<div class="border-b-2 border-black pb-2 text-lg">🐷 ${p.name} ${p.isHost ? '[H]' : ''}</div>`).join('')}</div>
                        ${room.host === state.user.uid ? `<button onclick="window.startGame()" class="pixel-btn bg-green-500 w-full text-white" ${players.length < 2 ? 'disabled' : ''}>게임 시작 (설정으로)</button>` : `<p class="animate-pulse text-center">방장이 설정을 시작하길 기다리는 중...</p>`}
                    </div>
                `;
            } 
            else if (room.status === 'SELECTING_CARDS') {
                if (room.host === state.user.uid) {
                    container.innerHTML = `
                        <div class="w-full max-w-md pixel-border bg-white text-black p-4">
                            <h2 class="pixel-font text-[10px] text-center mb-4 text-red-600 font-bold">이번 게임에 쓸 카드 6장을 고르세요 (${state.tempSelectedCards.length}/6)</h2>
                            <div class="grid grid-cols-4 gap-2 mb-6">
                                ${ALL_COLORS.map(c => `<div onclick="window.toggleCard('${c.id}')" class="aspect-square border-2 border-black cursor-pointer flex items-center justify-center text-[8px] text-center ${state.tempSelectedCards.includes(c.id) ? 'ring-4 ring-yellow-400 scale-105' : ''}" style="background-color: ${c.hex}; color: ${c.fontColor}">${c.name}</div>`).join('')}
                            </div>
                            <button onclick="window.confirmSetup()" class="pixel-btn bg-black text-white w-full" ${state.tempSelectedCards.length !== 6 ? 'disabled' : ''}>카드 선택 완료 & 주제 생성</button>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<div class="text-center animate-pulse"><p>방장이 카드를 고르고 있습니다...</p></div>`;
                }
            }
            else if (room.status === 'TOPIC_REVEAL') {
                container.innerHTML = `
                    <div class="w-full max-w-md pixel-border bg-white text-black p-6">
                        <h2 class="pixel-font text-xs mb-4 text-center border-b-2 border-black pb-2">📋 이번 판 주제 리스트 (6라운드)</h2>
                        <div class="space-y-3 mb-8 max-h-96 overflow-y-auto">
                            ${Object.entries(room.topicFlow).map(([r, cat]) => `
                                <div class="border-l-4 border-yellow-400 pl-3 py-1 text-left">
                                    <p class="text-[10px] font-bold">ROUND ${r}</p>
                                    <p class="text-[12px]">${cat}</p>
                                </div>
                            `).join('')}
                        </div>
                        ${room.host === state.user.uid ? 
                            `<button onclick="window.startRealGame()" class="pixel-btn bg-green-500 w-full text-white">확인 완료! 게임 시작</button>` : 
                            `<p class="text-center animate-pulse text-xs">방장이 주제를 확인 중입니다...</p>`
                        }
                    </div>
                `;
            }
            else if (room.status === 'PLAYING') {
                const roundNum = room.currentRound;
                const roundData = room.rounds?.[roundNum] || {};
                const playersIds = Object.keys(room.players);
                const isClueGiver = playersIds[(roundNum - 1) % playersIds.length] === state.user.uid;
                const hasSub = (roundData.submissions && roundData.submissions[state.user.uid]) || (isClueGiver && roundData.answer);
                const usedCards = new Set(
                    Object.entries(room.rounds || {})
                        .filter(([r]) => parseInt(r) !== roundNum)
                        .flatMap(([, rd]) => [
                            rd.submissions?.[state.user.uid],
                            rd.clueGiver === state.user.uid ? rd.answer : null
                        ].filter(Boolean))
                );
                const hand = [...room.selectedCards, 'piggy'].filter(cid => !usedCards.has(cid));

                container.innerHTML = `
                    <div class="w-full max-w-md flex flex-col gap-4">
                        <button onclick="window.updateState({showTopicModal: true}); window.playSound('click');" class="pixel-btn bg-blue-900 text-white text-[10px] py-2">📋 전체 주제 흐름 확인</button>
                        <div class="flex justify-between items-center px-2">
                            <div class="flex gap-1">
                                ${[1, 2, 3, 4, 5, 6].map(n => `<div class="w-4 h-4 border-2 border-black ${n < roundNum ? 'bg-green-500' : n === roundNum ? 'bg-yellow-400' : 'bg-gray-700'}"></div>`).join('')}
                            </div>
                            <span class="pixel-font text-[10px]">ROUND ${roundNum}</span>
                        </div>
                        ${isClueGiver && !roundData.clue ? `
                            <div class="pixel-border bg-white text-black p-4 w-full">
                                <h2 class="pixel-font text-xs mb-4 text-center text-red-600 font-bold">당신은 출제자입니다</h2>
                                <p class="text-[10px] font-bold mb-1">카테고리</p>
                                <div class="bg-yellow-400 border-2 border-black text-black text-center font-bold py-2 mb-4">${room.topicFlow[roundNum]}</div>
                                <input id="clueWord" placeholder="제시어 입력" class="pixel-input mb-4 text-base text-center">
                                <div class="grid grid-cols-4 gap-2 mb-6">
                                    ${hand.map(cid => { 
                                        const c = cid==='piggy'?{hex:'#1a1a1a', name:'JOKER', fontColor:'white'}:ALL_COLORS.find(x=>x.id===cid); 
                                        return `<div onclick="window.selCol='${cid}'; document.querySelectorAll('.col').forEach(e=>e.style.border='2px solid black'); this.style.border='4px solid #facc15'; window.playSound('click');" class="col aspect-square border-2 border-black cursor-pointer flex items-center justify-center text-[8px] text-center" style="background-color: ${c.hex}; color: ${c.fontColor}">${cid==='piggy'?'🐷':c.name}</div>` 
                                    }).join('')}
                                </div>
                                <button onclick="window.submitClue(document.getElementById('clueWord').value, window.selCol, '${room.topicFlow[roundNum]}')" class="pixel-btn bg-red-500 w-full text-white">제시어 전송</button>
                            </div>
                        ` : `
                            <div class="pixel-border bg-yellow-400 text-black p-6 mb-4 text-center">
                                <p class="text-[10px] mb-1 font-bold">[ ${roundData.selectedCategory || '대기 중'} ]</p>
                                <h2 class="pixel-font text-xl">${roundData.clue || '출제자가 고민 중...'}</h2>
                            </div>
                            ${roundData.clue && !isClueGiver ? `
                                <div class="grid grid-cols-3 gap-3">
                                    ${hand.map(cid => { 
                                        const c = cid==='piggy'?{hex:'#1a1a1a', name:'PIGGY', fontColor:'white'}:ALL_COLORS.find(x=>x.id===cid); 
                                        return `<div onclick="!${hasSub} && window.submitCard('${cid}')" class="pixel-card ${hasSub && roundData.submissions?.[state.user.uid] === cid ? 'selected' : ''} ${hasSub ? 'disabled' : ''}" style="background-color: ${c.hex}; color: ${c.fontColor}">${cid==='piggy'?'🐷':''}<span class="text-[8px] mt-1">${c.name}</span></div>` 
                                    }).join('')}
                                </div>
                            ` : hasSub ? `<p class="text-center animate-pulse py-10 text-yellow-500">다른 플레이어를 기다리는 중...</p>` : ''}
                        `}
                    </div>
                `;

                if (state.showTopicModal) {
                    const modal = document.createElement('div'); modal.className = 'modal-overlay';
                    modal.innerHTML = `
                        <div class="pixel-border bg-white text-black p-6 w-full max-w-xs relative text-left">
                            <h2 class="pixel-font text-xs mb-4 text-center border-b-2 border-black pb-2">📋 주제 흐름</h2>
                            <div class="space-y-3 max-h-80 overflow-y-auto">
                                ${Object.entries(room.topicFlow).map(([r, cat]) => `
                                    <div class="${r == roundNum ? 'bg-yellow-100 ring-2 ring-yellow-400 p-1' : 'opacity-50'}">
                                        <p class="text-[10px] font-bold">ROUND ${r}</p>
                                        <p class="text-[11px]">${cat}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="window.updateState({showTopicModal: false}); window.playSound('click');" class="pixel-btn bg-black text-white w-full mt-6 py-2 text-xs">닫기</button>
                        </div>
                    `;
                    container.appendChild(modal);
                }

                if (state.clueWarning && state.clueWarning.show) {
                    const warnModal = document.createElement('div');
                    warnModal.className = 'modal-overlay';
                    warnModal.innerHTML = `
                        <div class="pixel-border bg-white text-black p-6 w-full max-w-xs text-center">
                            <h2 class="pixel-font text-red-600 text-[10px] mb-4">⚠️ 금지어 감지</h2>
                            <div class="text-left space-y-3 mb-6">
                                <div>
                                    <p class="text-[10px] text-gray-500 mb-1">입력한 단어</p>
                                    <p class="border-b-2 border-black pb-1 font-bold text-lg">${state.clueWarning.word}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-gray-500 mb-1">감지된 금지어</p>
                                    <p class="text-red-500 font-bold">${state.clueWarning.found.join(', ')}</p>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="window.updateState({clueWarning: {show: false}})"
                                        class="pixel-btn bg-black text-white py-2 text-xs flex-1">수정</button>
                                <button onclick="window.forceSubmitClue()"
                                        class="pixel-btn bg-red-500 text-white py-2 text-xs flex-1">제출</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(warnModal);
                }
            } else if (room.status === 'REVEAL') {
                const sortedRounds = Object.entries(room.rounds || {}).sort(([a],[b]) => Number(a)-Number(b));
                const playerIds = Object.keys(room.players);
                const successCount = sortedRounds.filter(([,rd]) =>
                    Object.values(rd.submissions||{}).every(v => v===rd.answer||v==='piggy')
                ).length;

                const roundsHtml = sortedRounds.map(([r, rd]) => {
                    const answerColor = ALL_COLORS.find(c=>c.id===rd.answer)||{hex:'#888',fontColor:'white',name:'?'};
                    const isSuccess = Object.values(rd.submissions||{}).every(v=>v===rd.answer||v==='piggy');
                    const playersHtml = playerIds.map(uid => {
                        const name = room.players[uid].name;
                        if (rd.clueGiver===uid) return `<span class="text-[10px] bg-gray-200 px-2 py-0.5 border border-gray-400">${name}: 출제</span>`;
                        const sub = rd.submissions?.[uid];
                        if (!sub) return `<span class="text-[10px] bg-gray-100 px-2 py-0.5 border border-gray-300">${name}: -</span>`;
                        const ok = sub===rd.answer||sub==='piggy';
                        const sc = sub==='piggy'?{hex:'#1a1a1a',fontColor:'white'}:(ALL_COLORS.find(c=>c.id===sub)||{hex:'#888',fontColor:'white'});
                        return `<span class="text-[10px] border-2 px-2 py-0.5 ${ok?'border-green-500':'border-red-500'}" style="background:${sc.hex};color:${sc.fontColor}">${name} ${ok?'✓':'✗'}</span>`;
                    }).join('');
                    return `<div class="pixel-border bg-white text-black p-3">
                        <div class="flex justify-between mb-1">
                            <span class="pixel-font text-[8px]">ROUND ${r}</span>
                            <span class="pixel-font text-[8px] ${isSuccess?'text-green-600':'text-red-600'}">${isSuccess?'✓ CLEAR':'✗ FAIL'}</span>
                        </div>
                        <p class="text-[10px] text-gray-500 mb-1">${rd.selectedCategory||room.topicFlow?.[r]||''}</p>
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-6 h-6 border-2 border-black flex-shrink-0" style="background:${answerColor.hex}"></div>
                            <span class="font-bold text-base">"${rd.clue||'?'}"</span>
                        </div>
                        <div class="flex flex-wrap gap-1">${playersHtml}</div>
                    </div>`;
                }).join('');

                container.innerHTML = `
                    <div class="w-full max-w-md">
                        <h1 class="pixel-font text-xl text-yellow-400 text-center mb-1 animate-bounce">GAME OVER</h1>
                        <p class="text-center text-lg font-bold mb-4">${successCount} / ${sortedRounds.length} 라운드 성공</p>
                        <div class="space-y-3 mb-6 max-h-[60vh] overflow-y-auto">${roundsHtml}</div>
                        <button onclick="location.reload()" class="pixel-btn bg-yellow-400 text-black w-full">다시 하기</button>
                    </div>
                `;
            }
        };
        window.toggleCard = (cid) => {
            playSound('click');
            let cards = [...state.tempSelectedCards];
            if (cards.includes(cid)) cards = cards.filter(c => c !== cid);
            else if (cards.length < 6) cards.push(cid);
            updateState({ tempSelectedCards: cards });
        };
        window.createRoom = createRoom; window.joinRoom = joinRoom; window.startGame = startGame;
        window.confirmSetup = confirmSetup; window.submitClue = submitClue; window.submitCard = submitCard;
        window.updateState = updateState; window.playSound = playSound;

        signInAnonymously(auth); onAuthStateChanged(auth, u => { if(u) { state.user = u; render(); } });
    </script>
</body>
</html>
