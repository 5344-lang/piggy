<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Yellow 0.34 - 8-Bit Coop Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NeoDunggeunmo';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'NeoDunggeunmo', 'Malgun Gothic', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .pixel-font { font-family: 'Press Start 2P', 'NeoDunggeunmo', sans-serif; }
        .pixel-border { border: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .pixel-btn { position: relative; padding: 1rem; border-top: 4px solid black; border-left: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: all 0.1s; text-transform: uppercase; cursor: pointer; }
        .pixel-btn:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }
        .pixel-btn:disabled { background-color: #4b5563; box-shadow: none; transform: translate(4px, 4px); cursor: not-allowed; }
        
        .pixel-input { width: 100%; padding: 1rem; background-color: white; border: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); color: black; outline: none; }
        
        .pixel-card { width: 80px; height: 110px; border: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; transition: all 0.1s; position: relative; }
        .pixel-card.selected { border-color: #facc15; transform: scale(1.05); box-shadow: 0px 0px 15px 2px #facc15; z-index: 10; }
        .pixel-card.disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        @keyframes pixel-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-pixel-bounce { animation: pixel-bounce 1s infinite; }
        
        .category-box { cursor: pointer; border: 2px dashed #000; padding: 10px; transition: background 0.2s; }
        .category-box.active { background: #facc15; border-style: solid; color: black; font-weight: bold; }
    </style>
</head>
<body class="overflow-x-hidden text-sm">
    <div id="app" class="min-h-screen flex flex-col p-4 items-center justify-center">
        <div id="loading" class="pixel-font text-xs animate-pulse">SYSTEM LOADING...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDroroAeupG2Xik7P42mJ8HPHvGi7JOp0w",
            authDomain: "piggy-yellow-game.firebaseapp.com",
            projectId: "piggy-yellow-game",
            storageBucket: "piggy-yellow-game.firebasestorage.app",
            messagingSenderId: "903172799700",
            appId: "1:903172799700:web:f235053288e6f1db710f41",
            databaseURL: "https://piggy-yellow-game-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const appId = 'piggy-yellow-pixel';

        // --- 사진을 반영한 17가지 색상 데이터 ---
        const ALL_COLORS = [
            { id: 'red', name: '빨강색', hex: '#D32F2F', fontColor: 'white' }, 
            { id: 'blue_green', name: '청록색', hex: '#00897B', fontColor: 'white' },
            { id: 'pink', name: '분홍색', hex: '#EC407A', fontColor: 'white' }, 
            { id: 'brown', name: '갈색', hex: '#795548', fontColor: 'white' },
            { id: 'black', name: '검은색', hex: '#212121', fontColor: 'white' }, 
            { id: 'purple', name: '보라색', hex: '#7B1FA2', fontColor: 'white' },
            { id: 'beige', name: '연미색', hex: '#E6C280', fontColor: 'black' }, 
            { id: 'green', name: '초록색', hex: '#388E3C', fontColor: 'white' },
            { id: 'yellow', name: '노란색', hex: '#FBC02D', fontColor: 'black' }, 
            { id: 'gold', name: '금색', hex: '#D4AF37', fontColor: 'black' },
            { id: 'yellow_green', name: '연두색', hex: '#AFB42B', fontColor: 'black' }, 
            { id: 'burgundy', name: '자주색', hex: '#880E4F', fontColor: 'white' },
            { id: 'sky_blue', name: '연파란색', hex: '#4FC3F7', fontColor: 'black' }, 
            { id: 'blue', name: '파란색', hex: '#1976D2', fontColor: 'white' },
            { id: 'orange', name: '주황색', hex: '#F57C00', fontColor: 'white' }, 
            { id: 'white', name: '흰색', hex: '#F5F5F5', fontColor: 'black' },
            { id: 'gray', name: '회색', hex: '#757575', fontColor: 'white' }
        ];

        const CATEGORY_POOL = ["과일", "사탕", "여름", "동물", "가전", "운동", "채소", "우주", "직업", "음식", "악기", "날씨", "가구", "탈것", "문구", "옷", "장소", "감정"];
        
        // 금지어 목록 (사진에 있는 색상들의 이름, 영어, 한자 포함)
        const FORBIDDEN = ["빨강", "청록", "분홍", "갈색", "검정", "보라", "연미", "초록", "노랑", "금색", "연두", "자주", "파란", "연파란", "주황", "흰색", "하얀", "회색", "레드", "블루", "그린", "핑크", "브라운", "블랙", "퍼플", "베이지", "옐로", "골드", "버건디", "스카이", "오렌지", "화이트", "그레이", "청", "홍", "황", "백", "흑", "녹", "자", "회"];

        // --- State Management ---
        let state = { user: null, roomCode: '', roomData: null, playerName: '', error: '' };
        window.state = state;

        const updateState = (newState) => {
            state = { ...state, ...newState };
            window.state = state;
            render();
        };

        const playSound = (type) => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            // 성공 사운드 (배열 사용)
            if (type === 'success') { 
               [440, 554, 659, 880].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, now + i * 0.1);
                }); 
                gain.gain.setValueAtTime(0.1, now); 
                gain.gain.linearRampToValueAtTime(0, now + 0.4); 
                osc.start(); osc.stop(now + 0.4); 
            }
            // 클릭 사운드
            if (type === 'click') { 
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now); 
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1); 
                gain.gain.setValueAtTime(0.1, now); 
                osc.start(); osc.stop(now + 0.1); 
            }
        };

        const createRoom = async () => {
            if (!state.playerName) return updateState({ error: '이름을 입력하세요!' });
            playSound('click');
            const newCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            const initialData = {
                host: state.user.uid,
                status: 'LOBBY',
                players: { [state.user.uid]: { name: state.playerName, isHost: true } }
            };
            await set(ref(db, `artifacts/${appId}/rooms/${newCode}`), initialData);
            state.roomCode = newCode;
            startSync(newCode);
        };

        const joinRoom = async (code) => {
            if (!state.playerName || !code) return updateState({ error: '이름과 코드를 입력하세요!' });
            playSound('click');
            const targetCode = code.toUpperCase();
            onValue(ref(db, `artifacts/${appId}/rooms/${targetCode}`), (snap) => {
                if (snap.exists()) {
                    update(ref(db, `artifacts/${appId}/rooms/${targetCode}/players`), { [state.user.uid]: { name: state.playerName, isHost: false } });
                    state.roomCode = targetCode;
                    startSync(targetCode);
                } else updateState({ error: '방을 찾을 수 없습니다' });
            }, { onlyOnce: true });
        };

        const startSync = (code) => {
            onValue(ref(db, `artifacts/${appId}/rooms/${code}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                updateState({ roomData: data });
            });
        };

        const startGame = async () => {
            playSound('click');
            const shuffled = [...ALL_COLORS].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 6).map(c => c.id); // 17장 중 랜덤 6장 선택
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), {
                status: 'PLAYING',
                selectedCards: selected, 
                currentRound: 1
            });
            nextRoundInit(1);
        };

        const nextRoundInit = async (roundNum) => {
            const cats = [...CATEGORY_POOL].sort(() => 0.5 - Math.random()).slice(0, 3);
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}/rounds/${roundNum}`), {
                categoryOptions: cats
            });
        };

        const submitClue = async (word, colorId, category) => {
            if (!word || !colorId || !category) return alert('카테고리, 단어, 정답 카드를 모두 선택해주세요!');
            
            // 금지어 검사 로직
            const isForbidden = FORBIDDEN.some(f => word.replace(/\s+/g, '').includes(f));
            if (isForbidden) {
                playSound('fail');
                return alert('⚠️ 색상과 관련된 단어(한글, 영어, 한자)는 사용할 수 없습니다!');
            }
            
            playSound('click');
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}/rounds/${state.roomData.currentRound}`), {
                clue: word,
                answer: colorId,
                selectedCategory: category,
                clueGiver: state.user.uid
            });
        };

        const submitCard = async (colorId) => {
            playSound('click');
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}/rounds/${state.roomData.currentRound}/submissions`), {
                [state.user.uid]: colorId
            });
            checkRoundEnd();
        };

        const checkRoundEnd = () => {
            const room = state.roomData;
            const round = room.rounds[room.currentRound];
            const playerCount = Object.keys(room.players).length;
            const subCount = Object.keys(round.submissions || {}).length;

            if (subCount === playerCount - 1) { // 출제자 제외 모두 제출 완료
                if (room.currentRound < 6) {
                    setTimeout(async () => {
                        const next = room.currentRound + 1;
                        await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { currentRound: next });
                        nextRoundInit(next);
                    }, 2000);
                } else {
                    update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { status: 'REVEAL' });
                }
            }
        };

        const resetGame = () => {
            playSound('click');
            window.location.reload();
        };

        const render = () => {
            const container = document.getElementById('app');
            if (!state.user) return;

            if (!state.roomCode) {
                container.innerHTML = `
                    <div class="flex flex-col items-center gap-8 w-full max-w-xs">
                        <div class="text-center">
                            <div class="text-8xl mb-6 animate-pixel-bounce inline-block">🐷</div>
                            <h1 class="pixel-font text-2xl text-yellow-400 mb-2 leading-tight uppercase">PIGGY<br>YELLOW</h1>
                        </div>
                        <input id="playerName" value="${state.playerName}" placeholder="이름 입력" class="pixel-input text-center" oninput="window.state.playerName = this.value">
                        <div class="flex flex-col gap-4 w-full">
                            <button onclick="window.createRoom()" class="pixel-btn bg-yellow-400 pixel-font text-[10px]">방 만들기</button>
                            <div class="flex gap-2">
                                <input id="joinCode" placeholder="코드" class="pixel-input uppercase flex-1 text-center">
                                <button onclick="window.joinRoom(document.getElementById('joinCode').value)" class="pixel-btn bg-blue-500 pixel-font text-[10px] text-white">참가</button>
                            </div>
                        </div>
                        ${state.error ? `<p class="text-red-500 text-xs">${state.error}</p>` : ''}
                    </div>
                `;
                return;
            }

            const room = state.roomData;
            if (!room) return;

            if (room.status === 'LOBBY') {
                const players = Object.values(room.players);
                container.innerHTML = `
                    <div class="w-full max-w-md pixel-border bg-white text-black p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="pixel-font text-xs">로비</h2>
                            <div class="bg-yellow-400 p-2 border-2 border-black font-bold">${state.roomCode}</div>
                        </div>
                        <div class="space-y-4 mb-8">
                            ${players.map(p => `<div class="border-b-2 border-black pb-2 text-lg">🐷 ${p.name} ${p.isHost ? '<span class="text-xs text-gray-500">[방장]</span>' : ''}</div>`).join('')}
                        </div>
                        ${room.host === state.user.uid ? `<button onclick="window.startGame()" class="pixel-btn bg-green-500 w-full text-white" ${players.length < 2 ? 'disabled' : ''}>게임 시작</button>` : `<p class="animate-pulse text-center">호스트를 기다리는 중...</p>`}
                    </div>
                `;
            } else if (room.status === 'PLAYING') {
                const roundNum = room.currentRound;
                const roundData = room.rounds?.[roundNum] || {};
                const playersIds = Object.keys(room.players);
                // 출제자를 돌아가면서 배정
                const isClueGiver = playersIds[(roundNum - 1) % playersIds.length] === state.user.uid;
                const hasSubmitted = (roundData.submissions && roundData.submissions[state.user.uid]) || (isClueGiver && roundData.answer);
                
                // 손패 구성: 랜덤 6장 + 피기(조커) 1장 = 총 7장
                const hand = [...room.selectedCards, 'piggy'];

                let content = `
                    <div class="w-full max-w-md flex flex-col h-full">
                        <div class="flex justify-between mb-4 px-2 items-center">
                            <div class="flex gap-1">
                                ${[1, 2, 3, 4, 5, 6].map(n => `<div class="w-4 h-4 border-2 border-black ${n < roundNum ? 'bg-green-500' : n === roundNum ? 'bg-yellow-400' : 'bg-gray-700'}"></div>`).join('')}
                            </div>
                            <span class="pixel-font text-[10px]">ROUND ${roundNum}</span>
                        </div>
                `;

                if (isClueGiver && !roundData.clue) {
                    content += `
                        <div class="pixel-border bg-white text-black p-4 w-full">
                            <h2 class="pixel-font text-xs mb-4 text-center text-red-600">당신은 출제자입니다</h2>
                            
                            <p class="text-xs mb-2 font-bold">1. 카테고리 선택 (3개 중 1개)</p>
                            <div class="grid grid-cols-3 gap-2 mb-4">
                                ${(roundData.categoryOptions || []).map(cat => `<div onclick="window.selCat='${cat}'; document.querySelectorAll('.cat').forEach(e=>e.classList.remove('active')); this.classList.add('active')" class="cat category-box text-center text-sm">${cat}</div>`).join('')}
                            </div>
                            
                            <p class="text-xs mb-2 font-bold">2. 제시어 입력 (색상 이름 금지!)</p>
                            <input id="clueWord" placeholder="예: 블루베리(X) 과일(O)" class="pixel-input mb-4 text-base">
                            
                            <p class="text-xs mb-2 font-bold">3. 정답 카드 선택</p>
                            <div class="grid grid-cols-4 gap-2 mb-6">
                                ${hand.map(cid => {
                                    const isPiggy = cid === 'piggy';
                                    const c = isPiggy ? {hex:'#1a1a1a', name:'PIGGY', fontColor:'white'} : ALL_COLORS.find(x => x.id === cid);
                                    return `<div onclick="window.selCol='${cid}'; document.querySelectorAll('.col').forEach(e=>e.style.border='2px solid black'); this.style.border='4px solid #facc15'" class="col aspect-square border-2 border-black cursor-pointer flex items-center justify-center text-[8px] text-center" style="background-color: ${c.hex}; color: ${c.fontColor}">${isPiggy ? '🐷<br>JOKER' : c.name}</div>`
                                }).join('')}
                            </div>
                            
                            <button onclick="window.submitClue(document.getElementById('clueWord').value, window.selCol, window.selCat)" class="pixel-btn bg-red-500 w-full text-xs text-white">제시어 전송</button>
                        </div>
                    `;
                } else {
                    content += `
                        <div class="pixel-border bg-yellow-400 text-black p-6 mb-6 text-center">
                            <p class="text-xs mb-2 text-yellow-800 font-bold">[ 카테고리: ${roundData.selectedCategory || '대기 중'} ]</p>
                            <h2 class="pixel-font text-xl">${roundData.clue || '출제자가 고민 중...'}</h2>
                        </div>
                        ${roundData.clue && !isClueGiver ? `
                            <p class="text-xs mb-2 text-center text-gray-300">정답이라고 생각되는 카드를 선택하세요!</p>
                            <div class="grid grid-cols-3 gap-4 justify-items-center">
                                ${hand.map(cid => {
                                    const isPiggy = cid === 'piggy';
                                    const c = isPiggy ? {hex:'#1a1a1a', name:'PIGGY', fontColor:'white'} : ALL_COLORS.find(x => x.id === cid);
                                    return `
                                        <div onclick="!${hasSubmitted} && window.submitCard('${cid}')" 
                                             class="pixel-card ${hasSubmitted && roundData.submissions?.[state.user.uid] === cid ? 'selected' : ''} ${hasSubmitted ? 'disabled' : ''}"
                                             style="background-color: ${c.hex}; color: ${c.fontColor}">
                                            ${isPiggy ? '<span class="text-2xl mb-1">🐷</span>' : ''}
                                            <span class="pixel-font text-[8px] text-center">${isPiggy ? 'JOKER' : c.name}</span>
                                        </div>
                                    `
                                }).join('')}
                            </div>
                        ` : hasSubmitted ? `<p class="text-center animate-pulse mt-10 text-yellow-400">다른 플레이어의 선택을 기다리는 중...</p>` : ''}
                    `;
                }
                container.innerHTML = content + `</div>`;
            } else if (room.status === 'REVEAL') {
                const rounds = Object.entries(room.rounds || {});
                container.innerHTML = `
                    <div class="w-full max-w-md mx-auto py-10">
                        <div class="pixel-border bg-white text-black p-6 mb-8 text-center">
                            <h1 class="pixel-font text-2xl mb-2">GAME OVER</h1>
                        </div>
                        <div class="space-y-4 mb-10">
                            ${rounds.map(([idx, data]) => {
                                const subs = Object.values(data.submissions || {});
                                const isSuccess = subs.every(v => v === data.answer || v === 'piggy');
                                const answerColor = data.answer === 'piggy' ? '#1a1a1a' : ALL_COLORS.find(c => c.id === data.answer)?.hex;
                                return `
                                    <div class="pixel-border p-4 flex flex-col gap-2 ${isSuccess ? 'bg-green-900 border-green-500' : 'bg-red-900 border-red-500'}">
                                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                                            <div class="text-xs text-gray-300">LV.${idx} [${data.selectedCategory}] <strong class="text-white text-sm">${data.clue}</strong></div>
                                            <span class="pixel-font text-lg font-black ml-2">${isSuccess ? 'O' : 'X'}</span>
                                        </div>
                                        <div class="flex gap-2 items-center">
                                            <span class="text-[10px] text-gray-400">정답:</span>
                                            <div class="w-6 h-6 border-2 border-white text-[8px] flex items-center justify-center" style="background-color: ${answerColor}">${data.answer === 'piggy' ? '🐷' : ''}</div>
                                            <span class="text-[10px] text-gray-400 ml-2">선택:</span>
                                            ${subs.map(s => {
                                                const sc = s === 'piggy' ? '#1a1a1a' : ALL_COLORS.find(c => c.id === s)?.hex;
                                                return `<div class="w-6 h-6 border-2 border-white text-[8px] flex items-center justify-center" style="background-color: ${sc}">${s === 'piggy' ? '🐷' : ''}</div>`
                                            }).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <button onclick="window.resetGame()" class="pixel-btn bg-yellow-400 w-full pixel-font text-xs text-black">처음으로 돌아가기</button>
                    </div>
                `;
            }
        };

        window.createRoom = createRoom;
        window.joinRoom = joinRoom;
        window.startGame = startGame;
        window.submitClue = submitClue;
        window.submitCard = submitCard;
        window.resetGame = resetGame;

        signInAnonymously(auth).catch((err) => console.error(err));
        onAuthStateChanged(auth, (u) => { if (u) { state.user = u; render(); } });
    </script>
</body>
</html>
