<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Yellow 2- Strategic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NeoDunggeunmo';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
            font-weight: normal; font-style: normal;
        }
        body { background-color: #1a1a1a; color: white; font-family: 'NeoDunggeunmo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .pixel-font { font-family: 'Press Start 2P', 'NeoDunggeunmo', sans-serif; }
        .pixel-border { border: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .pixel-btn { position: relative; padding: 0.8rem; border-top: 4px solid black; border-left: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); transition: all 0.1s; text-transform: uppercase; cursor: pointer; text-align: center; }
        .pixel-btn:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); }
        .pixel-btn:disabled { background-color: #4b5563; opacity: 0.6; cursor: not-allowed; }
        .pixel-input { width: 100%; padding: 1rem; background-color: white; border: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); color: black; outline: none; }
        .pixel-card { width: 75px; height: 100px; border: 4px solid black; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s; }
        .pixel-card.selected { border-color: #facc15; transform: scale(1.05); box-shadow: 0px 0px 15px 2px #facc15; z-index: 10; }
        .pixel-card.disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .category-box { cursor: pointer; border: 2px dashed #000; padding: 8px; font-size: 11px; }
        .category-box.active { background: #facc15; border-style: solid; color: black; font-weight: bold; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @keyframes pixel-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-pixel-bounce { animation: pixel-bounce 1s infinite; }
    </style>
</head>
<body class="overflow-x-hidden text-sm">
    <div id="app" class="min-h-screen flex flex-col p-4 items-center justify-center">
        <div id="loading" class="pixel-font text-xs animate-pulse">SYSTEM LOADING...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { CATEGORY_POOL, FORBIDDEN } from './data.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDroroAeupG2Xik7P42mJ8HPHvGi7JOp0w",
            authDomain: "piggy-yellow-game.firebaseapp.com",
            projectId: "piggy-yellow-game",
            storageBucket: "piggy-yellow-game.firebasestorage.app",
            messagingSenderId: "903172799700",
            appId: "1:903172799700:web:f235053288e6f1db710f41",
            databaseURL: "https://piggy-yellow-game-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const appId = 'piggy-yellow-pixel';

        const ALL_COLORS = [
            { id: 'red', name: '빨강색', hex: '#D32F2F', fontColor: 'white' }, { id: 'blue_green', name: '청록색', hex: '#00897B', fontColor: 'white' },
            { id: 'pink', name: '분홍색', hex: '#EC407A', fontColor: 'white' }, { id: 'brown', name: '갈색', hex: '#795548', fontColor: 'white' },
            { id: 'black', name: '검은색', hex: '#212121', fontColor: 'white' }, { id: 'purple', name: '보라색', hex: '#7B1FA2', fontColor: 'white' },
            { id: 'beige', name: '연미색', hex: '#E6C280', fontColor: 'black' }, { id: 'green', name: '초록색', hex: '#388E3C', fontColor: 'white' },
            { id: 'yellow', name: '노란색', hex: '#FBC02D', fontColor: 'black' }, { id: 'gold', name: '금색', hex: '#D4AF37', fontColor: 'black' },
            { id: 'yellow_green', name: '연두색', hex: '#AFB42B', fontColor: 'black' }, { id: 'burgundy', name: '자주색', hex: '#880E4F', fontColor: 'white' },
            { id: 'sky_blue', name: '연파란색', hex: '#4FC3F7', fontColor: 'black' }, { id: 'blue', name: '파란색', hex: '#1976D2', fontColor: 'white' },
            { id: 'orange', name: '주황색', hex: '#F57C00', fontColor: 'white' }, { id: 'white', name: '흰색', hex: '#F5F5F5', fontColor: 'black' },
            { id: 'gray', name: '회색', hex: '#757575', fontColor: 'white' }
        ];

        let state = { user: null, roomCode: '', roomData: null, playerName: '', error: '', tempSelectedCards: [], showTopicModal: false };
        window.state = state;

        const updateState = (newState) => { state = { ...state, ...newState }; window.state = state; render(); };

        const playSound = (type) => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);

            const createOsc = (freq, startTime, duration, oscType = 'square') => {
                const osc = audioCtx.createOscillator();
                osc.type = oscType;
                osc.frequency.setValueAtTime(freq, startTime);
                osc.connect(gain);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };

            switch(type) {
                case 'click':
                    gain.gain.setValueAtTime(0.05, now);
                    createOsc(800, now, 0.05);
                    break;
                case 'success':
                    gain.gain.setValueAtTime(0.05, now);
                   [440, 554, 659, 880].forEach((f, i) => createOsc(f, now + (i * 0.1), 0.1, 'triangle'));
                    break;
                case 'fail':
                    gain.gain.setValueAtTime(0.1, now);
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                    osc.connect(gain);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
                case 'start':
                    gain.gain.setValueAtTime(0.05, now);
                    createOsc(400, now, 0.1);
                    createOsc(800, now + 0.1, 0.2);
                    break;
            }
        };

        const createRoom = async () => {
            if (!state.playerName) return updateState({ error: '이름을 입력하세요!' });
            playSound('click');
            const newCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            await set(ref(db, `artifacts/${appId}/rooms/${newCode}`), { 
                host: state.user.uid, 
                status: 'LOBBY', 
                players: { [state.user.uid]: { name: state.playerName, isHost: true } } 
            });
            state.roomCode = newCode; startSync(newCode);
        };

        const joinRoom = async (code) => {
            if (!state.playerName || !code) return updateState({ error: '이름과 코드를 입력하세요!' });
            playSound('click');
            const targetCode = code.toUpperCase();
            onValue(ref(db, `artifacts/${appId}/rooms/${targetCode}`), (snap) => {
                if (snap.exists()) { 
                    update(ref(db, `artifacts/${appId}/rooms/${targetCode}/players`), { [state.user.uid]: { name: state.playerName, isHost: false } }); 
                    state.roomCode = targetCode; startSync(targetCode); 
                } else updateState({ error: '방을 찾을 수 없습니다' });
            }, { onlyOnce: true });
        };

        const startSync = (code) => { 
            onValue(ref(db, `artifacts/${appId}/rooms/${code}`), (snapshot) => { 
                const data = snapshot.val(); 
                if (!data) return;
                if (data.status === 'REVEAL' && state.roomData?.status !== 'REVEAL') {
                    const rounds = Object.values(data.rounds || {});
                    const allCorrect = rounds.length === 6 && rounds.every(r => {
                        const subs = Object.values(r.submissions || {});
                        return subs.every(v => v === r.answer || v === 'piggy');
                    });
                    playSound(allCorrect ? 'success' : 'fail');
                }
                updateState({ roomData: data }); 
            }); 
        };

        const startGame = async () => {
            playSound('click');
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { status: 'SELECTING_CARDS' });
        };

        const confirmSetup = async () => {
            if (state.tempSelectedCards.length !== 6) return alert("카드를 6장 골라주세요!");
            playSound('start');
            const shuffledCats = [...CATEGORY_POOL].sort(() => 0.5 - Math.random());
            const topicFlow = {};
            for(let i=1; i<=6; i++) { topicFlow[i] = shuffledCats.slice((i-1)*3, i*3); }
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), {
                status: 'PLAYING',
                selectedCards: state.tempSelectedCards,
                topicFlow: topicFlow,
                currentRound: 1
            });
        };

        const submitClue = async (word, colorId, category) => {
            if (!word || !colorId || !category) return alert('모두 선택해주세요!');
            
            // 💡 피드백 반영: 금지어 안내 문구 수정
            if (FORBIDDEN.some(f => word.replace(/\s+/g, '').includes(f))) {
                playSound('fail');
                return alert('🤔 금지어가 포함된 것 같아요. 다시 확인해 보시겠어요?');
            }
            
            playSound('click');
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}/rounds/${state.roomData.currentRound}`), { 
                clue: word, answer: colorId, selectedCategory: category, clueGiver: state.user.uid 
            });
        };

        const submitCard = async (colorId) => {
            playSound('click');
            await update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}/rounds/${state.roomData.currentRound}/submissions`), { 
                [state.user.uid]: colorId 
            });
            const room = state.roomData;
            const subCount = Object.keys(room.rounds[room.currentRound].submissions || {}).length;
            if (subCount === Object.keys(room.players).length - 1) {
                if (room.currentRound < 6) {
                    setTimeout(() => {
                        playSound('success');
                        update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { currentRound: room.currentRound + 1 });
                    }, 1500);
                } else {
                    update(ref(db, `artifacts/${appId}/rooms/${state.roomCode}`), { status: 'REVEAL' });
                }
            }
        };

        const render = () => {
            const container = document.getElementById('app');
            if (!state.user) return;
            if (!state.roomCode) {
                container.innerHTML = `
                    <div class="flex flex-col items-center gap-8 w-full max-w-xs">
                        <div class="text-8xl mb-6 animate-pixel-bounce inline-block">🐷</div>
                        <h1 class="pixel-font text-2xl text-yellow-400">PIGGY YELLOW</h1>
                        <input id="playerName" value="${state.playerName}" placeholder="이름 입력" class="pixel-input text-center" oninput="window.state.playerName = this.value">
                        <button onclick="window.createRoom()" class="pixel-btn bg-yellow-400 w-full text-black">방 만들기</button>
                        <div class="flex gap-2 w-full">
                            <input id="joinCode" placeholder="코드" class="pixel-input uppercase text-center flex-1">
                            <button onclick="window.joinRoom(document.getElementById('joinCode').value)" class="pixel-btn bg-blue-500 text-white px-6">참가</button>
                        </div>
                    </div>
                `;
                return;
            }

            const room = state.roomData; if (!room) return;

            if (room.status === 'LOBBY') {
                const players = Object.values(room.players);
                container.innerHTML = `
                    <div class="w-full max-w-md pixel-border bg-white text-black p-6">
                        <div class="flex justify-between items-center mb-6"><h2 class="pixel-font text-xs">로비</h2><div class="bg-yellow-400 p-2 border-2 border-black font-bold">${state.roomCode}</div></div>
                        <div class="space-y-4 mb-8">${players.map(p => `<div class="border-b-2 border-black pb-2 text-lg">🐷 ${p.name} ${p.isHost ? '[H]' : ''}</div>`).join('')}</div>
                        ${room.host === state.user.uid ? `<button onclick="window.startGame()" class="pixel-btn bg-green-500 w-full text-white" ${players.length < 2 ? 'disabled' : ''}>게임 시작 (설정으로)</button>` : `<p class="animate-pulse text-center">방장이 설정을 시작하길 기다리는 중...</p>`}
                    </div>
                `;
            } 
            else if (room.status === 'SELECTING_CARDS') {
                if (room.host === state.user.uid) {
                    container.innerHTML = `
                        <div class="w-full max-w-md pixel-border bg-white text-black p-4">
                            <h2 class="pixel-font text-[10px] text-center mb-4 text-red-600 font-bold">이번 게임에 쓸 카드 6장을 고르세요 (${state.tempSelectedCards.length}/6)</h2>
                            <div class="grid grid-cols-4 gap-2 mb-6">
                                ${ALL_COLORS.map(c => `<div onclick="window.toggleCard('${c.id}')" class="aspect-square border-2 border-black cursor-pointer flex items-center justify-center text-[8px] text-center ${state.tempSelectedCards.includes(c.id) ? 'ring-4 ring-yellow-400 scale-105' : ''}" style="background-color: ${c.hex}; color: ${c.fontColor}">${c.name}</div>`).join('')}
                            </div>
                            <button onclick="window.confirmSetup()" class="pixel-btn bg-black text-white w-full" ${state.tempSelectedCards.length !== 6 ? 'disabled' : ''}>카드 선택 완료 & 주제 생성</button>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<div class="text-center animate-pulse"><p>방장이 카드를 고르고 있습니다...</p></div>`;
                }
            }
            else if (room.status === 'PLAYING') {
                const roundNum = room.currentRound;
                const roundData = room.rounds?.[roundNum] || {};
                const playersIds = Object.keys(room.players);
                const isClueGiver = playersIds[(roundNum - 1) % playersIds.length] === state.user.uid;
                const hasSub = (roundData.submissions && roundData.submissions[state.user.uid]) || (isClueGiver && roundData.answer);
                const hand = [...room.selectedCards, 'piggy'];

                container.innerHTML = `
                    <div class="w-full max-w-md flex flex-col gap-4">
                        <button onclick="window.updateState({showTopicModal: true}); window.playSound('click');" class="pixel-btn bg-blue-900 text-white text-[10px] py-2">📋 전체 주제 흐름 확인</button>
                        <div class="flex justify-between items-center px-2">
                            <div class="flex gap-1">
                                ${[1, 2, 3, 4, 5, 6].map(n => `<div class="w-4 h-4 border-2 border-black ${n < roundNum ? 'bg-green-500' : n === roundNum ? 'bg-yellow-400' : 'bg-gray-700'}"></div>`).join('')}
                            </div>
                            <span class="pixel-font text-[10px]">ROUND ${roundNum}</span>
                        </div>
                        ${isClueGiver && !roundData.clue ? `
                            <div class="pixel-border bg-white text-black p-4 w-full">
                                <h2 class="pixel-font text-xs mb-4 text-center text-red-600 font-bold">당신은 출제자입니다</h2>
                                <p class="text-[10px] font-bold mb-2">1. 카테고리 선택</p>
                                <div class="grid grid-cols-3 gap-2 mb-4">
                                    ${room.topicFlow[roundNum].map(cat => `<div onclick="window.selCat='${cat}'; document.querySelectorAll('.cat').forEach(e=>e.classList.remove('active')); this.classList.add('active'); window.playSound('click');" class="cat category-box text-center">${cat}</div>`).join('')}
                                </div>
                                <input id="clueWord" placeholder="제시어 입력" class="pixel-input mb-4 text-base text-center">
                                <div class="grid grid-cols-4 gap-2 mb-6">
                                    ${hand.map(cid => { 
                                        const c = cid==='piggy'?{hex:'#1a1a1a', name:'JOKER', fontColor:'white'}:ALL_COLORS.find(x=>x.id===cid); 
                                        return `<div onclick="window.selCol='${cid}'; document.querySelectorAll('.col').forEach(e=>e.style.border='2px solid black'); this.style.border='4px solid #facc15'; window.playSound('click');" class="col aspect-square border-2 border-black cursor-pointer flex items-center justify-center text-[8px] text-center" style="background-color: ${c.hex}; color: ${c.fontColor}">${cid==='piggy'?'🐷':c.name}</div>` 
                                    }).join('')}
                                </div>
                                <button onclick="window.submitClue(document.getElementById('clueWord').value, window.selCol, window.selCat)" class="pixel-btn bg-red-500 w-full text-white">제시어 전송</button>
                            </div>
                        ` : `
                            <div class="pixel-border bg-yellow-400 text-black p-6 mb-4 text-center">
                                <p class="text-[10px] mb-1 font-bold">[ ${roundData.selectedCategory || '대기 중'} ]</p>
                                <h2 class="pixel-font text-xl">${roundData.clue || '출제자가 고민 중...'}</h2>
                            </div>
                            ${roundData.clue && !isClueGiver ? `
                                <div class="grid grid-cols-3 gap-3">
                                    ${hand.map(cid => { 
                                        const c = cid==='piggy'?{hex:'#1a1a1a', name:'PIGGY', fontColor:'white'}:ALL_COLORS.find(x=>x.id===cid); 
                                        return `<div onclick="!${hasSub} && window.submitCard('${cid}')" class="pixel-card ${hasSub && roundData.submissions?.[state.user.uid] === cid ? 'selected' : ''} ${hasSub ? 'disabled' : ''}" style="background-color: ${c.hex}; color: ${c.fontColor}">${cid==='piggy'?'🐷':''}<span class="text-[8px] mt-1">${c.name}</span></div>` 
                                    }).join('')}
                                </div>
                            ` : hasSub ? `<p class="text-center animate-pulse py-10 text-yellow-500">다른 플레이어를 기다리는 중...</p>` : ''}
                        `}
                    </div>
                `;

                if (state.showTopicModal) {
                    const modal = document.createElement('div'); modal.className = 'modal-overlay';
                    modal.innerHTML = `
                        <div class="pixel-border bg-white text-black p-6 w-full max-w-xs relative">
                            <h2 class="pixel-font text-xs mb-4 text-center border-b-2 border-black pb-2">📋 주제 흐름</h2>
                            <div class="space-y-3 max-h-80 overflow-y-auto">
                                ${Object.entries(room.topicFlow).map(([r, cats]) => `
                                    <div class="${r == roundNum ? 'bg-yellow-100 ring-2 ring-yellow-400 p-1' : 'opacity-50'}">
                                        <p class="text-[10px] font-bold">ROUND ${r}</p>
                                        <p class="text-[11px]">${cats.join(', ')}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="window.updateState({showTopicModal: false}); window.playSound('click');" class="pixel-btn bg-black text-white w-full mt-6 py-2 text-xs">닫기</button>
                        </div>
                    `;
                    container.appendChild(modal);
                }
            } else if (room.status === 'REVEAL') {
                container.innerHTML = `<div class="text-center"><h1 class="pixel-font text-3xl mb-8 animate-bounce">GAME OVER</h1><button onclick="location.reload()" class="pixel-btn bg-yellow-400 text-black px-10">다시 하기</button></div>`;
            }
        };

        window.toggleCard = (cid) => {
            playSound('click');
            let cards = [...state.tempSelectedCards];
            if (cards.includes(cid)) cards = cards.filter(c => c !== cid);
            else if (cards.length < 6) cards.push(cid);
            updateState({ tempSelectedCards: cards });
        };
        window.createRoom = createRoom; window.joinRoom = joinRoom; window.startGame = startGame;
        window.confirmSetup = confirmSetup; window.submitClue = submitClue; window.submitCard = submitCard;
        window.updateState = updateState; window.playSound = playSound;

        signInAnonymously(auth); onAuthStateChanged(auth, u => { if(u) { state.user = u; render(); } });
    </script>
</body>
</html>
